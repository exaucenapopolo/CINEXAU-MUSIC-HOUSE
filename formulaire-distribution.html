<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Distribution | CINEXAU</title>
    <style>
        :root { --bg: #0a0a0a; --card: #1a1a1a; --text: #f4f4f4; --accent: #d4af37; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 50px 20px; display: flex; justify-content: center; }
        
        .form-container { background-color: var(--card); padding: 40px; border-radius: 8px; width: 100%; max-width: 700px; border: 1px solid var(--border); }
        .form-container h2 { margin-bottom: 10px; color: var(--accent); }
        .form-container p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        .form-group input[type="text"], .form-group input[type="date"], .form-group textarea { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
        
        .file-upload { border: 2px dashed var(--border); padding: 20px; text-align: center; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .file-upload:hover { border-color: var(--accent); }
        .file-upload input[type="file"] { display: none; }

        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-weight: normal; cursor: pointer; }

        .btn-submit { width: 100%; padding: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { background: #b5952f; }
        
        .back-link { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="dashboard-artiste.html" class="back-link">← Retour au tableau de bord</a>
        <h2>Distribution Digitale</h2>
        <p>Veuillez fournir toutes les informations nécessaires pour l'envoi de votre morceau sur les plateformes.</p>

        <form id="distributionForm">
            <div class="form-group">
                <label>Nom de l'artiste principal</label>
                <input type="text" id="artistName" placeholder="Ex: John Doe" required>
            </div>
            <div class="form-group">
                <label>Titre du projet (Single / EP / Album)</label>
                <input type="text" id="projectTitle" placeholder="Titre exact" required>
            </div>
            
            <div class="form-group">
                <label>Fichier Audio (Format WAV obligatoire)</label>
                <label class="file-upload">
                    Cliquez ici pour sélectionner votre fichier audio
                    <input type="file" id="audioFile" accept=".wav" required>
                </label>
            </div>

            <div class="form-group">
                <label>Pochette Officielle (Carré, 3000x3000px, haute qualité)</label>
                <label class="file-upload">
                    Cliquez ici pour sélectionner votre cover
                    <input type="file" id="coverFile" accept="image/jpeg, image/png" required>
                </label>
            </div>

            <div class="form-group">
                <label>Date de sortie souhaitée (Laissez un délai de 2 à 3 semaines)</label>
                <input type="date" id="releaseDate" required>
            </div>

            <div class="form-group">
                <label>Plateformes ciblées</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" checked> Spotify</label>
                    <label><input type="checkbox" checked> Apple Music</label>
                    <label><input type="checkbox" checked> Deezer</label>
                    <label><input type="checkbox" checked> YouTube Music</label>
                    <label><input type="checkbox" checked> Amazon Music</label>
                    <label><input type="checkbox" checked> TikTok / Instagram</label>
                </div>
            </div>

            <button type="submit" class="btn-submit">Soumettre mon projet</button>
        </form>
    </div>

    <script>
        document.getElementById('distributionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // C'est ici que le code back-end interviendra pour envoyer les données au serveur
            alert('Votre demande a été enregistrée avec succès. Vous pouvez suivre son évolution dans votre tableau de bord.');
            window.location.href = 'dashboard-artiste.html';
        });
    </script>
</body>
</html>

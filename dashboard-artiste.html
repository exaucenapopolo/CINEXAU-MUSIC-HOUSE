<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Artiste | CINEXAU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#0a0a0f; color:white; display:flex; min-height:100vh; }
        .sidebar { width:260px; background:#101018; padding:30px 20px; display:flex; flex-direction:column; gap:20px; }
        .sidebar a { color:#ccc; text-decoration:none; padding:12px; border-radius:8px; display:flex; align-items:center; gap:10px; transition:0.3s; }
        .sidebar a:hover, .sidebar a.active { background:#f9ca24; color:#000; }
        .main { flex:1; padding:30px; }
        .service-selector { display:flex; gap:15px; flex-wrap:wrap; margin:25px 0; }
        .service-btn { background:#151520; border:1px solid #2a2a3a; padding:12px 25px; border-radius:30px; cursor:pointer; transition:0.3s; }
        .service-btn.active { background:#f9ca24; color:#000; border-color:#f9ca24; }
        .form-card { background:#151520; padding:25px; border-radius:16px; display:none; margin-top:20px; }
        .form-card.active { display:block; }
        input, textarea, select { width:100%; padding:12px; margin:10px 0; background:#1e1e2f; border:1px solid #2a2a3a; color:white; border-radius:8px; }
        .btn { background:#f9ca24; color:#000; padding:12px 30px; border:none; border-radius:30px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:#f9ca24;">CINEXAU</h2>
        <a href="#" class="active" onclick="showSection('services')"><i class="fas fa-tools"></i> Services</a>
        <a href="#" onclick="showSection('demandes')"><i class="fas fa-list"></i> Mes demandes</a>
        <a href="#"><i class="fas fa-comments"></i> Messages</a>
        <a href="#"><i class="fas fa-cog"></i> Paramètres</a>
    </div>
    <div class="main" id="mainContent">
        <h2>Bonjour, <span id="artistName"></span></h2>
        <div class="service-selector">
            <button class="service-btn active" onclick="openService('distribution')">Distribution</button>
            <button class="service-btn" onclick="openService('visuels')">Visuels</button>
            <button class="service-btn" onclick="openService('chanson')">Chanson personnalisée</button>
            <button class="service-btn" onclick="openService('clips')">Clip AI</button>
        </div>

        <!-- Formulaire Distribution -->
        <div id="form-distribution" class="form-card active">
            <h3>Demande de distribution</h3>
            <input type="text" placeholder="Titre du projet">
            <input type="text" placeholder="Nom de l'artiste">
            <input type="file" id="audioFile">
            <input type="file" id="coverFile">
            <input type="date">
            <select><option>Spotify</option><option>Apple Music</option></select>
            <button class="btn" onclick="soumettreDemande('distribution')">Envoyer</button>
        </div>
        <!-- Autres formulaires (visuels, chanson, clips) similaires -->
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('cinexau_currentUser'));
        if(!user) window.location.href='connexion.html';
        document.getElementById('artistName').textContent = user.name || 'Artiste';

        function openService(service) {
            document.querySelectorAll('.form-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`form-${service}`).classList.add('active');
            document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        function soumettreDemande(type) {
            let demandes = JSON.parse(localStorage.getItem('cinexau_demandes') || '[]');
            demandes.push({ artiste: user.email, type, date: new Date().toISOString(), statut: 'En attente' });
            localStorage.setItem('cinexau_demandes', JSON.stringify(demandes));
            alert('Demande envoyée avec succès !');
        }
        function showSection(section) {
            // gestion affichage dynamique simplifiée
        }
    </script>
</body>
</html>

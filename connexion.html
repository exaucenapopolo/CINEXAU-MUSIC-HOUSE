<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Artiste | CINEXAU</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#0a0a0f; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .auth-container {
            background:#151520; padding:40px; border-radius:16px; width:400px; max-width:90%;
            box-shadow:0 0 30px rgba(249,202,36,0.2);
        }
        h2 { color:#f9ca24; margin-bottom:25px; text-align:center; }
        .form-group { margin-bottom:20px; }
        input { width:100%; padding:14px; background:#1e1e2f; border:1px solid #2a2a3a; border-radius:8px; color:white; }
        button { width:100%; padding:14px; background:#f9ca24; color:#000; font-weight:700; border:none; border-radius:8px; cursor:pointer; transition:0.3s; }
        button:hover { background:#f0932b; }
        .toggle { text-align:center; margin-top:20px; color:#aaa; }
        .toggle a { color:#f9ca24; }
        .error { color:#ff4d4d; font-size:0.9rem; display:none; }
    </style>
</head>
<body>
    <div class="auth-container" id="loginForm">
        <h2>Connexion Artiste</h2>
        <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="Mot de passe"></div>
        <p class="error" id="loginError">Email ou mot de passe incorrect.</p>
        <button onclick="login()">Se connecter</button>
        <div class="toggle">Pas de compte ? <a href="#" onclick="switchForm()">S'inscrire</a></div>
    </div>
    <div class="auth-container" id="registerForm" style="display:none;">
        <h2>Inscription Artiste</h2>
        <div class="form-group"><input type="text" id="regName" placeholder="Nom d'artiste"></div>
        <div class="form-group"><input type="email" id="regEmail" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="regPassword" placeholder="Mot de passe"></div>
        <button onclick="register()">Créer mon compte</button>
        <div class="toggle">Déjà membre ? <a href="#" onclick="switchForm()">Se connecter</a></div>
    </div>
    <script>
        function switchForm() {
            document.getElementById('loginForm').style.display = 
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = 
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
        }
        function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            if(!name || !email || !password) return alert("Veuillez remplir tous les champs.");
            const users = JSON.parse(localStorage.getItem('cinexau_users') || '[]');
            if(users.find(u => u.email === email)) return alert("Cet email est déjà utilisé.");
            users.push({ name, email, password, role:'artist' });
            localStorage.setItem('cinexau_users', JSON.stringify(users));
            alert("Compte créé avec succès ! Connectez-vous.");
            switchForm();
        }
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const users = JSON.parse(localStorage.getItem('cinexau_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            if(!user) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            localStorage.setItem('cinexau_currentUser', JSON.stringify(user));
            window.location.href = 'dashboard-artiste.html';
        }
    </script>
</body>
</html>
